apiVersion: v1
kind: Service
metadata:
  name: serverless-webinar-app
spec:
  selector:
    app: serverless-webinar-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
# ServiceAccount with IRSA annotation — allows the pod to call CloudWatch
# without static AWS credentials. Replace the role ARN with the one you
# create for this service in your AWS account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serverless-webinar-app
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<your-account-id>:role/serverless-webinar-app-cloudwatch-role
